spring.application.name=ss9_p2

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ss9_p2?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=duongloc2505

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Config log
logging.level.root=info
logging.level.ra.edu.api.controller=warn
logging.level.ra.edu.api.service=error
logging.level.org.springframework=warn
logging.file.name=logs/application.log
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.max-file-size=100MB
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{39} %msg%n
